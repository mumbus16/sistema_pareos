<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventarios | Pareos in Paradise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-section" class="login-overlay">
    <div class="login-card">
        <h1>Pareos in Paradise</h1>
        <p>Sistema de Inventarios y Ventas</p>
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
        <span id="mensaje-error" style="color: #ef4444; display: block; margin-top: 10px;"></span>
    </div>
</div>

<div id="app-container" style="display: none;" class="container">
    <aside class="sidebar">
        <h2>Pareos Admin</h2>
        <button onclick="cargarVista('inicio')">🏠 Inicio</button>
        
        <div class="menu-group">
            <p style="color: #64748b; font-size: 12px; margin-top: 20px; margin-bottom: 10px;">GESTIÓN</p>
            <button onclick="cargarVista('inventario')">📦 Inventario Maestro</button>
            <button onclick="cargarVista('transferencias')">🔄 Transferir Stock</button>
            <button onclick="cargarVista('precios')">🏷️ Gestión de Precios</button>
            <button onclick="cargarVista('pos')">🛒 Punto de Venta (POS)</button>
        </div>

        <div class="menu-group">
            <p style="color: #64748b; font-size: 12px; margin-top: 20px; margin-bottom: 10px;">CONTROL</p>
            <button onclick="cargarVista('auditoria')">🔍 Auditoría</button>
            <button onclick="cargarVista('reportes')">📊 Reportes</button>
            <p style="color: #64748b; font-size: 12px; margin-top: 20px; margin-bottom: 10px;">SISTEMA</p>
    <button onclick="cargarVista('configuracion')">⚙️ Configuración</button>
        </div>

        <button onclick="cerrarSesion()" class="btn-logout" style="margin-top: 30px;">🚪 Cerrar Sesión</button>
    </aside>

    <main class="main-content">
        <div id="contenido">
            <h1>Bienvenido</h1>
            <p>Selecciona una opción del menú para comenzar.</p>
        </div>
    </main>
</div>

<div id="modalSeguridad" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div style="font-size: 50px; color: #ef4444; margin-bottom: 15px;">⚠️</div>
        <h3>Confirmar Eliminación</h3>
        <p>Introduce la contraseña de administrador:</p>
        <input type="password" id="passAdminConfirm" placeholder="Contraseña" style="width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px;">
        <div style="display: flex; gap: 10px;">
            <button id="btnConfirmarBorrado" class="btn-save" style="background: #ef4444; flex: 1;">Eliminar</button>
            <button onclick="cerrarModalSeguridad()" class="btn-cancel" style="flex: 1;">Cancelar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script src="transferencias.js"></script>
<script src="auditoria.js"></script>
<script src="pos.js"></script>
<script src="reports.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>



</body>
</html>
